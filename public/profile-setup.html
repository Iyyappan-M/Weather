<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Profile Setup</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Restoring Previous Styles for Profile Setup Specifically */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .auth-card {
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .auth-card.wider { max-width: 600px; }
        .auth-header { margin-bottom: 2.5rem; }
        .auth-header h2 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }
        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 12px 18px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 1.25rem; border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .input-group:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .input-group i { color: var(--text-muted); }
        .input-group input {
            background: transparent; border: none; outline: none;
            color: white; width: 100%; font-size: 1rem;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .error-text { color: var(--danger); margin-top: 1rem; font-size: 0.85rem; }
    </style>
</head>
<body class="auth-page">
    <div class="background-container"></div>
    <main class="auth-container">
        <div class="auth-card glass wider">
            <div class="auth-header">
                <h2>Complete Your Profile</h2>
                <p>Tell us where you are to personalize your dashboard</p>
            </div>
            <form id="profile-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" placeholder="Your Full Name" required>
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <i class="fa-solid fa-city"></i>
                        <input type="text" id="city" placeholder="Default City" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-earth-americas"></i>
                        <input type="text" id="country" placeholder="Country" required>
                    </div>
                </div>
                <button type="submit" class="premium-btn">Complete Setup <i class="fa-solid fa-check-double"></i></button>
            </form>
            <div id="error-msg" class="error-text hidden"></div>
        </div>
    </main>
    <script>
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const city = document.getElementById('city').value;
            const country = document.getElementById('country').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/user/profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, city, country })
                });
                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
